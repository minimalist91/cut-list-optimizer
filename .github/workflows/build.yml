# build.yml
# This runs on GitHub's Windows machines every time you push code.
# It installs Python, installs your libraries, builds the .exe,
# and makes it available to download.

name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install customtkinter openpyxl pyinstaller reportlab

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name CutListOptimizer ^
            --hidden-import reportlab ^
            --hidden-import reportlab.lib ^
            --hidden-import reportlab.lib.pagesizes ^
            --hidden-import reportlab.lib.colors ^
            --hidden-import reportlab.lib.units ^
            --hidden-import reportlab.lib.utils ^
            --hidden-import reportlab.pdfgen ^
            --hidden-import reportlab.pdfgen.canvas ^
            --hidden-import customtkinter ^
            --collect-all customtkinter ^
            --collect-all reportlab ^
            --add-data "optimizer.py;." ^
            --add-data "pdf_export.py;." ^
            main.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: CutListOptimizer-Windows
          path: dist/CutListOptimizer.exe